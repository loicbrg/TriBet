services:

  # ── Application Flask / Gunicorn ────────────────────────────────────────────
  app:
    build: .
    container_name: tribet-app
    restart: unless-stopped
    environment:
      SECRET_KEY: "changez-cette-clé-en-production-2026"
      TRIBET_DB: "/data/tribet.db"
    volumes:
      - tribet-data:/data          # persistance de la base SQLite
    expose:
      - "8000"

  # ── Nginx – reverse proxy & fichiers statiques ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: tribet-nginx
    restart: unless-stopped
    ports:
      - "8081:80"                  # HTTP — accès depuis le réseau local (port 8081)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro    # fichiers statiques servis directement par Nginx
    depends_on:
      - app

volumes:
  tribet-data:
    name: tribet-data
