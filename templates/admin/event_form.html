{% extends "base.html" %}
{% block title %}{{ 'Modifier' if event else 'Nouvel' }} événement – Admin TriBet{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="section-header">
        <h1 class="h3 mb-0">
          <i class="fa-solid fa-calendar-plus text-warning me-2"></i>
          {{ 'Modifier l\'événement' if event else 'Nouvel événement' }}
        </h1>
      </div>
      <div class="card-dark p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label text-muted small">Nom de l'événement</label>
            <input type="text" name="name" class="form-control form-control-dark"
                   value="{{ event.name if event else '' }}"
                   placeholder="Triathlon L d'Embrun 2026" required>
          </div>
          <div class="mb-3">
            <label class="form-label text-muted small">Lieu</label>
            <input type="text" name="location" class="form-control form-control-dark"
                   value="{{ event.location if event else '' }}"
                   placeholder="Embrun, Hautes-Alpes, France">
          </div>
          <div class="mb-3">
            <label class="form-label text-muted small">Date et heure de départ</label>
            <input type="datetime-local" name="race_date" class="form-control form-control-dark"
                   value="{{ event.race_date.strftime('%Y-%m-%dT%H:%M') if event else '' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label text-muted small">Description</label>
            <textarea name="description" class="form-control form-control-dark" rows="4"
                      placeholder="Description de la course…">{{ event.description if event else '' }}</textarea>
          </div>
          <div class="mb-4">
            <label class="form-label text-muted small">Statut</label>
            <select name="status" class="form-select form-control-dark">
              <option value="upcoming" {{ 'selected' if not event or event.status == 'upcoming' }}>À venir</option>
              <option value="live" {{ 'selected' if event and event.status == 'live' }}>En cours (Live)</option>
              <option value="finished" {{ 'selected' if event and event.status == 'finished' }}>Terminé</option>
              <option value="cancelled" {{ 'selected' if event and event.status == 'cancelled' }}>Annulé</option>
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary-tribet">
              <i class="fa-solid fa-save me-2"></i>Enregistrer
            </button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
